name: Build & Release Wallo APK

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - run: npm install

      - run: |
          mkdir -p android
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > android/wallo-release.jks

      - run: |
          cat > android/key.properties <<EOF
          storeFile=wallo-release.jks
          storePassword=${{ secrets.KEYSTORE_PASSWORD }}
          keyAlias=${{ secrets.KEY_ALIAS }}
          keyPassword=${{ secrets.KEY_PASSWORD }}
          EOF

      - run: npx cap sync android

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - run: chmod +x android/gradlew

      - working-directory: android
        run: ./gradlew assembleRelease

      - name: Rename APK
        run: |
          mkdir release
          cp android/app/build/outputs/apk/release/app-release.apk release/Wallo-${GITHUB_REF_NAME}.apk

      - uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: release/Wallo-${{ github.ref_name }}.apk