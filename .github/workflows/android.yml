name: Build & Release Wallo APK

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm install

      - name: Restore signing keystore
        run: |
          mkdir -p android
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > android/wallo-release.jks

      - name: Create key.properties
        run: |
          cat > android/key.properties <<EOF
          storeFile=wallo-release.jks
          storePassword=${{ secrets.KEYSTORE_PASSWORD }}
          keyAlias=${{ secrets.KEY_ALIAS }}
          keyPassword=${{ secrets.KEY_PASSWORD }}
          EOF

      - name: Sync Capacitor
        run: npx cap sync android

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Make Gradle executable
        run: chmod +x android/gradlew

      - name: Build Release APK
        working-directory: android
        run: ./gradlew assembleRelease

      - name: Find generated APK
        run: |
          echo "Searching for APK..."
          find android -type f -name "*.apk"

      - name: Prepare Release APK
        run: |
          mkdir -p release
          APK=$(find android -type f -name "*.apk" | head -n 1)
          echo "Using APK: $APK"
          cp "$APK" "release/Wallo-${GITHUB_REF_NAME}.apk"

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: release/Wallo-${{ github.ref_name }}.apk